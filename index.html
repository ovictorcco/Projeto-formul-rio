<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário Victor</title>
</head>
<body>
    <div class="content">
        <h1>Formulário</h1>
        <form>
            <div>
                <input type="text" placeholder="Digite seu nome" class="inputs">
                <span class="span-required">Nome deve ter no minímo 3 caracteres</span>
            </div>
            <div>
                <input type="email" placeholder="Digite seu melhor email" class="inputs">
                <span class="span-required">Digite um email válido</span>
            </div>
            <div>
                <input type="password" placeholder="Digite sua senha" class="inputs">
                <span class="span-required">Senha deve ter no minímo 6 caracteres</span>
            </div>
            <div>
                <input type="password" placeholder="Repita sua senha" class="input">
                <span class="span-required">Senhas devem ser compátiveis</span>
            </div>
       </form>
    </div>
</body>
</html>
